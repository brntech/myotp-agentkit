name: better-auth

on:
  push:
    branches: [main]
    paths:
      - "better-auth/**"
      - ".github/workflows/better-auth.yml"
  pull_request:
    paths:
      - "better-auth/**"
      - ".github/workflows/better-auth.yml"

defaults:
  run:
    working-directory: better-auth

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: better-auth/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/better-auth@')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: better-auth/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
