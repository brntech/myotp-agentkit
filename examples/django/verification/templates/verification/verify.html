{% extends "verification/base.html" %}

{% block heading %}Enter code{% endblock %}

{% block content %}
  <p>We sent a code via <strong>{{ channel }}</strong> to <strong>+{{ phone }}</strong>. Enter it below.</p>

  <form method="post" action="{% url 'verify_otp' %}">
    {% csrf_token %}
    <label>
      <span>Verification code</span>
      <input
        name="otp"
        type="text"
        inputmode="numeric"
        autocomplete="one-time-code"
        maxlength="8"
        required
      />
    </label>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <button type="submit">Verify</button>
  </form>
{% endblock %}
