{% extends "verification/base.html" %}

{% block content %}
  <p>Enter your phone number in international format (no leading +). MyOTP will send a 6-digit code.</p>

  <form method="post" action="{% url 'send_otp' %}">
    {% csrf_token %}
    <label>
      <span>Phone number</span>
      <input name="phone" type="tel" inputmode="numeric" placeholder="14155551234" required />
    </label>

    <fieldset>
      <legend>Channel</legend>
      <label class="inline"><input type="radio" name="channel" value="sms" checked /> SMS</label>
      <label class="inline"><input type="radio" name="channel" value="whatsapp" /> WhatsApp</label>
      <label class="inline"><input type="radio" name="channel" value="telegram" /> Telegram</label>
    </fieldset>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <button type="submit">Send code</button>
  </form>
{% endblock %}
