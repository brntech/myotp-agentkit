<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enter code</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Enter code</h1>
      <p id="hint">We sent a code to your phone. Enter it below.</p>

      <form id="verify-form">
        <label>
          <span>Verification code</span>
          <input name="otp" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" required />
        </label>

        <p id="error" class="error" hidden></p>
        <button type="submit">Verify</button>
      </form>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
